<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35f0d0"/>
      <stop offset="50%" stop-color="#8a6bff"/>
      <stop offset="100%" stop-color="#e24de0"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35f0d0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8a6bff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="240" fill="#05070c"/>
  <circle cx="256" cy="256" r="225" fill="none" stroke="url(#ring)" stroke-width="8"/>
  <g transform="translate(256,260)" fill="url(#leaf)">
    <!-- center spine -->
    <path d="M0,-180 Q4,-90 0,100 Q-4,-90 0,-180Z" opacity="0.95"/>
    <!-- top pair -->
    <path d="M0,-150 Q45,-130 90,-155 Q55,-105 0,-110Z"/>
    <path d="M0,-150 Q-45,-130 -90,-155 Q-55,-105 0,-110Z"/>
    <!-- upper mid pair -->
    <path d="M0,-105 Q60,-80 120,-110 Q70,-55 0,-55Z"/>
    <path d="M0,-105 Q-60,-80 -120,-110 Q-70,-55 0,-55Z"/>
    <!-- lower mid pair (widest) -->
    <path d="M0,-50 Q75,-25 145,-60 Q85,5 0,10Z"/>
    <path d="M0,-50 Q-75,-25 -145,-60 Q-85,5 0,10Z"/>
    <!-- bottom pair -->
    <path d="M0,15 Q55,30 105,-5 Q65,55 0,60Z"/>
    <path d="M0,15 Q-55,30 -105,-5 Q-65,55 0,60Z"/>
    <!-- stem -->
    <path d="M-5,60 Q-3,130 0,160 Q3,130 5,60Z" opacity="0.7"/>
  </g>
</svg>
